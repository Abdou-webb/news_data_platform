
x-airflow-common:
  &airflow-common
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Dependencies are pre-installed in the custom Dockerfile — no runtime pip needed
    # Variables d'environnement propagées depuis le .env
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    PG_HOST: ${PG_HOST}
    PG_PORT: ${PG_PORT}
    PG_USER: ${PG_USER}
    PG_PASSWORD: ${PG_PASSWORD}
    PG_DB: ${PG_DB}
    KAFKA_BROKER: ${KAFKA_BROKER}
    KAFKA_TOPIC: ${KAFKA_TOPIC}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./scrapers:/opt/airflow/scrapers
    - ./transformations:/opt/airflow/transformations
    - ./dbt_transform:/opt/airflow/dbt_transform
  depends_on:
    - postgres-airflow

services:
  # ==========================================
  # Zookeeper & Kafka (Streaming)
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - data_network
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - data_network
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ==========================================
  # MinIO (Data Lake — S3 compatible)
  # ==========================================
  minio:
    image: minio/minio:RELEASE.2023-08-09T23-30-22Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    networks:
      - data_network
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    container_name: minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      /usr/bin/mc mb myminio/bronze || true;
      /usr/bin/mc mb myminio/silver || true;
      /usr/bin/mc mb myminio/gold || true;
      exit 0;
      "
    networks:
      - data_network

  # ==========================================
  # PostgreSQL — Data Warehouse (couche Gold)
  # ==========================================
  postgres-dw:
    image: postgres:15
    container_name: postgres_dw
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    networks:
      - data_network
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # ==========================================
  # PostgreSQL — Base interne d'Airflow
  # ==========================================
  postgres-airflow:
    image: postgres:15
    container_name: postgres_airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    networks:
      - data_network
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data

  # ==========================================
  # PostgreSQL — Base interne de Metabase
  # Séparée du Data Warehouse pour éviter les conflits de base de données
  # ==========================================
  postgres-metabase:
    image: postgres:15
    container_name: postgres_metabase
    environment:
      POSTGRES_USER: ${METABASE_DB_USER}
      POSTGRES_PASSWORD: ${METABASE_DB_PASSWORD}
      POSTGRES_DB: metabase
    networks:
      - data_network
    volumes:
      - postgres_metabase_data:/var/lib/postgresql/data

  # ==========================================
  # Apache Airflow
  # ==========================================
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    networks:
      - data_network

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      - postgres-airflow
      - airflow-init
    networks:
      - data_network

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    depends_on:
      - postgres-airflow
      - airflow-init
    networks:
      - data_network

  # ==========================================
  # Metabase (Visualisation & Dashboards)
  # ==========================================
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      # Base de données interne de Metabase (stockage des dashboards, users, etc.)
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${METABASE_DB_USER}
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: postgres-metabase
    depends_on:
      - postgres-metabase
      - postgres-dw
    networks:
      - data_network
    volumes:
      - metabase_data:/metabase-data

networks:
  data_network:
    driver: bridge

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  minio_data:
  postgres_dw_data:
  postgres_airflow_data:
  postgres_metabase_data:
  metabase_data:
